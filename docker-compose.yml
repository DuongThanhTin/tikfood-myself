services:
  postgres:
    image: postgres:16-alpine
    container_name: tikfood-automation-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: tikfood-automation-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ai-code-runner:
        condition: service_started
      api:
        condition: service_started
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change_this_to_a_long_random_string}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Ho_Chi_Minh}
      AI_CODE_RUNNER_URL: http://ai-code-runner:8080/jobs/feature
    volumes:
      - n8n_data:/home/node/.n8n

  api:
    build:
      context: ./apps/api
    container_name: tikfood-api
    restart: unless-stopped
    depends_on:
      api-db:
        condition: service_healthy
    ports:
      - "18081:18081"
    environment:
      PORT: 18081
      DATABASE_URL: ${API_DATABASE_URL:-postgres://tikfood:tikfood@api-db:5432/tikfood?sslmode=disable}

  api-db:
    build:
      context: .
      dockerfile: ./apps/api/db/Dockerfile
    container_name: tikfood-api-db
    restart: unless-stopped
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: ${API_POSTGRES_USER:-tikfood}
      POSTGRES_PASSWORD: ${API_POSTGRES_PASSWORD:-tikfood}
      POSTGRES_DB: ${API_POSTGRES_DB:-tikfood}
    volumes:
      - api_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${API_POSTGRES_USER:-tikfood} -d ${API_POSTGRES_DB:-tikfood}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./apps/web
    container_name: tikfood-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:18081

  ai-code-runner:
    build:
      context: ./apps/ai-code-runner
    container_name: tikfood-automation-ai-code-runner
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1}
      AI_AGENT_URL: ${AI_AGENT_URL:-}
      RUNNER_WORKSPACE_DIR: /runner_workspace
    volumes:
      - runner_workspace:/runner_workspace

volumes:
  postgres_data:
  api_postgres_data:
  n8n_data:
  runner_workspace:
